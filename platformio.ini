; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
src_dir = .

[env:esp32dev]
extra_scripts = pre:load_env.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
; platform_packages =
    ; platformio/toolchain-xtensa-esp-elf@14.2.0+20241119
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; CONFIG_* SDK settings live in sdkconfig.defaults, not here.
; Passing them as -D flags causes macro-redefinition spam because the build
; system generates sdkconfig.h from sdkconfig.defaults and both end up
; defining the same symbol.
build_flags =
	-DLOG_FORMAT_DETAILED=0
	-Wno-error=deprecated-declarations
	; Force-include the shim *before* any framework header so it wins the
	; #pragma once race for sdkconfig.h and can override CONFIG_BT_HFP_ENABLE=0.
	; This silences the "forcing BR/EDR max sync conn eff to 1" #pragma message
	; in esp_bredr_cfg.h without touching the pre-built framework files.
	-include suppress_bt_pragma.h
upload_speed = 921600
lib_deps =
	;BLE library is built-in to framework
; upload_port = COM9   ; set in settings.ini (gitignored) or pass via: pio run -t upload --upload-port COMx
board_build.partitions = default.csv
board_build.filesystem = none
build_src_filter =
  +<*.ino>
  +<*.cpp>
  +<*.c>
  -<.git/>
  -<.pio/>
  -<.vscode/>
  -<tests/>
  -<data/>
  -<*.md>
  -<*.example>
